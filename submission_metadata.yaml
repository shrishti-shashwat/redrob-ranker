# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid ranker over 100K profiles for a Senior AI Engineer JD. Stage 1:
  deterministic honeypot/consistency checks (expert-skill-with-0-months,
  current-job implied-date vs the dataset's frozen 2026-06 clock, career-span
  vs stated-experience) exclude impossible profiles. Stage 2: corroboration-
  gated structured features — skills score only when title or career history
  corroborates them (measured P(PyTorch|ML-titled)=21.6% vs 1.2%), killing
  keyword stuffers. Stage 3: fusion of MiniLM bi-encoder semantic similarity
  (5 authored JD facets) + custom BM25, z-normalised and combined with the
  structured score (0.45/0.40/0.15). Graded JD disqualifiers: consulting-only
  and research-only careers are multiplicative kills; job-hopping, CV/speech-
  only, LangChain-only are penalties. Stage 4: a behavioral availability
  multiplier (recency, recruiter response, open-to-work, notice, location)
  modulates the score, separating "behavioral twins". Reasoning is generated
  programmatically from extracted facts — no LLM, zero hallucination. The timed
  ranking step runs in ~2 s on CPU; heavy work is precomputed offline per
  spec §10.3.

# ============================================================================
# Declarations
# ============================================================================
declarations:
